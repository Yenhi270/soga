<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tác phẩm | Soga Wedding</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
    <div class="logo">
        <img src="images/logo.png" alt="Logo" style="height: 40px; margin-right: 12px;">
        <span>SOGA.</span>
    </div>

    <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <div class="nav-links" id="nav-list">
        <a href="index.html">Trang chủ</a>
        <a href="about.html">Câu chuyện</a>
        <a href="service.html">Báo giá</a>
        <a href="gallery.html">Tác phẩm</a>
        <a href="contact.html">Liên hệ</a>
    </div>
</header>

<section class="section" style="padding-top: 15vh; padding-bottom: 5vh;">
    <div class="section-header reveal">
        <span>PORTFOLIO</span>
        <h2>Triển lãm Tình yêu</h2>
    </div>
</section>

<div class="editorial-gallery reveal">
    <div class="img-wrapper"><img src="images/1.jpg" alt="Gallery"></div>
    <div class="img-wrapper"><img src="images/2.jpg" alt="Gallery"></div>
    <div class="img-wrapper"><img src="images/3.jpg" alt="Gallery"></div>
    <div class="img-wrapper"><img src="images/4.jpg" alt="Gallery"></div>
    <div class="img-wrapper"><img src="images/5.jpg" alt="Gallery"></div>
    <div class="img-wrapper"><img src="images/6.jpg" alt="Gallery"></div> </div>

<div id="popup" class="popup" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; cursor: none;">
    <img id="popup-img" src="" style="max-width: 85%; max-height: 85%; object-fit: contain;">
    <span style="position: absolute; top: 30px; right: 50px; color: white; font-family: 'Montserrat'; letter-spacing: 2px; font-size: 12px;">ĐÓNG [X]</span>
</div>

<script src="script.js"></script>
<script>
    // Logic cho popup ở trang Gallery
    const galleryImgs = document.querySelectorAll('.editorial-gallery img');
    const popup = document.getElementById('popup');
    const popupImg = document.getElementById('popup-img');

    galleryImgs.forEach(img => {
        img.addEventListener('click', () => {
            popup.style.display = 'flex';
            popupImg.src = img.src;
        });
    });

    popup.addEventListener('click', () => {
        popup.style.display = 'none';
    });
</script>
</body>
</html>
