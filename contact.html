<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ | Soga Wedding</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-form { max-width: 600px; margin: 0 auto; text-align: left; }
        .form-group { margin-bottom: 30px; position: relative; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px 0; border: none; 
            border-bottom: 1px solid #ccc; background: transparent;
            font-family: 'Cormorant Garamond', serif; font-size: 18px;
            outline: none; transition: var(--transition-fast);
        }
        .form-group input:focus, .form-group textarea:focus { border-bottom-color: var(--accent-gold); }
        .contact-info-bar { display: flex; justify-content: center; gap: 5vw; margin-top: 80px; font-family: 'Montserrat'; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header class="nav">
    <div class="logo">
        <img src="images/logo.png" alt="Logo" style="height: 40px; margin-right: 12px;">
        <span>SOGA.</span>
    </div>

    <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <div class="nav-links" id="nav-list">
        <a href="index.html">Trang chủ</a>
        <a href="about.html">Câu chuyện</a>
        <a href="service.html">Báo giá</a>
        <a href="gallery.html">Tác phẩm</a>
        <a href="contact.html">Liên hệ</a>
    </div>
</header>

<section class="section" style="padding-top: 20vh;">
    <div class="section-header reveal">
        <span>GET IN TOUCH</span>
        <h2>Bắt đầu câu chuyện của bạn</h2>
    </div>

    <div class="contact-form reveal">
        <form>
            <div class="form-group">
                <input type="text" placeholder="Tên của hai bạn (VD: Văn Nam và Thu Thủy)" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Số điện thoại liên hệ" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Ngày dự kiến chụp / Ngày cưới">
            </div>
            <div class="form-group">
                <textarea rows="4" placeholder="Bạn muốn kể câu chuyện tình yêu của mình như thế nào?"></textarea>
            </div>
            <div style="text-align: center; margin-top: 50px;">
                <button type="submit" class="btn" style="background: transparent; cursor: none;">Gửi yêu cầu</button>
            </div>
        </form>
    </div>

    <div class="contact-info-bar reveal">
        <div>📍 QUẢNG NGÃI</div>
        <div>📞 0705 050 108</div>
        <div>✉️ SORA@GMAIL.COM</div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
